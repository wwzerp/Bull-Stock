<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bull Stock - Comece a investir com força</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .splash-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .logo-big {
      max-width: 320px;
      height: auto;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 1rem;
      color: #60a5fa;
    }

    p {
      font-size: 1.4rem;
      color: #94a3b8;
      max-width: 600px;
      margin-bottom: 3rem;
    }

    .btn-start {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 1.2rem 3.5rem;
      font-size: 1.4rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-start:hover {
      background: #2563eb;
      transform: translateY(-3px);
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #64748b;
      font-size: 0.95rem;
      border-top: 1px solid #334155;
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <img 
      src="IMAGES/Gemini_Generated_Image_686qan686qan686q.png" 
      alt="Bull Stock Logo" 
      class="logo-big"
    >

    <h1>Bull Stock</h1>

    <p>
      Invista com força. Acompanhe mercados em tempo real.<br>
      Tome decisões assertivas e cresça com confiança.
    </p>

    <a href="home.html" class="btn-start">
      Começar Agora
    </a>
  </div>

  <footer>
    © 2026 Bull Stock — Todos os direitos reservados
  </footer>

</body>
</html>
